<!doctype html>
<html>

<!---------->
<!-- head -->
<!---------->
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>
        {% if page.title == "HOME" %}
            {{ site.title }}
        {% else %}
            {{ page.title }} | {{ site.title }}
        {% endif %}
    </title>
    <meta name="description" content={{ site.description }}>
    <link rel="stylesheet" href={{ "/assets/css/styles.css" | relative_url }}>
    <link rel="icon" href={{ "/favicon.png" | relative_url }} type="image/png">
    <script src="https://kit.fontawesome.com/8e5ab83dc1.js" crossorigin="anonymous"></script>
  </head>
<!-- /head -->


<!---------->
<!-- body -->
<!---------->
<body>

  <header>
    <div class="header-inner">
      <p class="center"><a href="/"><img src={{ "assets/images/logo-min.png" | relative_url }} alt="waseda club flag football" id="logo"></a></p>
      <details class="header-mobile-nav">
        <summary class="mobile-nav-toggle" aria-label="メニューを開く">
          <span></span>
          <span></span>
          <span></span>
        </summary>
        <ul class="navbar mobile-navbar">
        {% for item in site.data.navigation %}
          <li {% if page.url == item.link %} class="current{% if item.external %} nav-external{% endif %}"{% elsif item.external %} class="nav-external"{% endif %}><a href="{% if item.external %}{{ item.link }}{% else %}{{ item.link | relative_url }}{% endif %}"{% if item.external %} target="_blank" rel="noopener noreferrer"{% endif %}>
            {% if item.external %}<img src={{ "assets/images/Instagram_Glyph_Gradient.png" | relative_url }} alt="" class="nav-instagram-icon">{% endif %}
            {{ item.name }}
          </a></li>
        {% endfor %}
        </ul>
      </details>
    </div>
    <p>フラッグフットボール</p>
    {% include navigation.html %}
  </header>

  {{ content }}

  <footer>
    <small>&copy; waseda club flag football</small>
  </footer>

</body>
<!-- body -->


</html>
