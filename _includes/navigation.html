<nav id="global_navi">
  <ul class="navbar desktop-navbar">
  {% for item in site.data.navigation %}
    <li {% if page.url == item.link %} class="current{% if item.external %} nav-external{% endif %}"{% elsif item.external %} class="nav-external"{% endif %}><a href="{% if item.external %}{{ item.link }}{% else %}{{ item.link | relative_url }}{% endif %}"{% if item.external %} target="_blank" rel="noopener noreferrer"{% endif %}>
      {% if item.external %}<img src={{ "assets/images/Instagram_Glyph_Gradient.png" | relative_url }} alt="" class="nav-instagram-icon">{% endif %}
      {{ item.name }}
    </a></li>
  {% endfor %}
  </ul>
</nav>
