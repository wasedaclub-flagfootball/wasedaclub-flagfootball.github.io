<nav id="global_navi" class="global-navi" data-nav-root>
  <button
    type="button"
    class="global-navi__toggle"
    id="global-navi-toggle"
    aria-expanded="false"
    aria-controls="global-navbar"
    aria-label="メニューを開く"
  >
    <span class="global-navi__toggle-bar" aria-hidden="true"></span>
    <span class="global-navi__toggle-bar" aria-hidden="true"></span>
    <span class="global-navi__toggle-bar" aria-hidden="true"></span>
  </button>
  <ul id="global-navbar" class="navbar">
  {% for item in site.data.navigation %}
    <li {% if page.url == item.link %} class="current{% if item.external %} nav-external{% endif %}"{% elsif item.external %} class="nav-external"{% endif %}><a href="{% if item.external %}{{ item.link }}{% else %}{{ item.link | relative_url }}{% endif %}"{% if item.external %} target="_blank" rel="noopener noreferrer"{% endif %}>
      {% if item.external %}<img src={{ "assets/images/Instagram_Glyph_Gradient.png" | relative_url }} alt="" class="nav-instagram-icon">{% endif %}
      {{ item.name }}
    </a></li>
  {% endfor %}
  </ul>
  <div class="global-navi__scrim" data-nav-scrim hidden tabindex="-1" aria-hidden="true"></div>
</nav>
